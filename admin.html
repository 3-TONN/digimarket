<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Админ — DigiMarket</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="catalog.html" class="logo">
                <div class="logo-icon">
                    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <rect width="36" height="36" rx="10" fill="#F97316"/>
                        <path d="M10 18L15 23L26 12" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="logo-text">DigiMarket</span>
            </a>
            <div class="nav-actions">
                <a href="catalog.html" class="btn-ghost">🛍 Каталог</a>
            </div>
        </div>
    </nav>

    <main class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">Админ-панель</h1>
                <p class="page-subtitle">Управление маркетплейсом</p>
            </div>

            <div class="admin-stats">
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-info">
                        <span class="stat-value" id="totalUsers">0</span>
                        <span class="stat-label">Пользователей</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🛍</div>
                    <div class="stat-info">
                        <span class="stat-value" id="totalProducts">4</span>
                        <span class="stat-label">Товаров</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <span class="stat-value" id="totalSales">0</span>
                        <span class="stat-label">Продаж</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⭐</div>
                    <div class="stat-info">
                        <span class="stat-value" id="totalRevenue">0</span>
                        <span class="stat-label">Доход Stars</span>
                    </div>
                </div>
            </div>

            <div class="admin-grid">
                <div class="admin-section">
                    <h2 class="section-title">📢 Рассылка</h2>
                    <div class="broadcast-form">
                        <div class="form-group">
                            <label>Получатели</label>
                            <select id="broadcastType" class="form-select">
                                <option value="all">Все пользователи</option>
                                <option value="active">Активные (7 дней)</option>
                                <option value="new">Новые (сегодня)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Сообщение</label>
                            <textarea id="broadcastText" class="form-textarea" rows="4" placeholder="Текст рассылки..."></textarea>
                        </div>
                        <div class="form-actions">
                            <button class="btn-primary" id="sendBroadcast">📤 Отправить</button>
                        </div>
                        <div id="broadcastStatus"></div>
                    </div>
                </div>

                <div class="admin-section">
                    <h2 class="section-title">🛍 Товары</h2>
                    <button class="btn-primary" id="addProductBtn" style="margin-bottom: 16px;">+ Добавить</button>
                    <div class="products-list" id="productsList"></div>
                </div>

                <div class="admin-section">
                    <h2 class="section-title">👥 Пользователи</h2>
                    <div class="users-list" id="usersList"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="productModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <button class="modal-close">✕</button>
            <h3>Новый товар</h3>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="productName" class="form-input" placeholder="Название">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="productDesc" class="form-textarea" rows="2" placeholder="Описание"></textarea>
            </div>
            <div class="form-group">
                <label>Цена (Stars)</label>
                <input type="number" id="productPrice" class="form-input" placeholder="100">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="productCategory" class="form-select">
                    <option value="templates">Шаблоны</option>
                    <option value="stickers">Стикеры</option>
                    <option value="bots">Боты</option>
                    <option value="presets">Пресеты</option>
                </select>
            </div>
            <button class="btn-primary full-width" id="saveProduct">💾 Сохранить</button>
        </div>
    </div>

    <div class="notification" id="notification">
        <div class="notification-content">
            <span class="notification-icon"></span>
            <span class="notification-text"></span>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
