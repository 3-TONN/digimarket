services:
  - type: web
    name: digimarket
    runtime: python
    plan: free
    buildCommand: pip install -r bot/requirements.txt && cd api && npm install
    startCommand: cd api && node server.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEB_APP_URL
        sync: false
